name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile main + test sources
        run: mvn -B -ntp test-compile

      - name: Unit tests (Surefire)
        run: mvn -B -ntp test

      - name: BPMN integration tests (Failsafe)
        run: mvn -B -ntp verify -DskipTests=false

      - name: Upload Surefire/Failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
